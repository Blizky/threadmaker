<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ThreadMaker Icon Index</title>
    <meta name="robots" content="noindex, nofollow, noarchive" />
    <style>
      :root {
        --bg: #11161d;
        --panel: #1d252f;
        --panel-2: #222c38;
        --text: #edf3f8;
        --muted: #a8b5c3;
        --accent: #0099cc;
        --border: rgba(237, 243, 248, 0.14);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      }

      .wrap {
        width: min(1200px, 100%);
        margin: 0 auto;
        padding: 18px;
      }

      .toolbar {
        position: sticky;
        top: 0;
        z-index: 10;
        background: linear-gradient(
          to bottom,
          rgba(17, 22, 29, 0.96),
          rgba(17, 22, 29, 0.86)
        );
        backdrop-filter: blur(2px);
        border-bottom: 1px solid var(--border);
        margin: -18px -18px 16px;
        padding: 14px 18px;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 1.05rem;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      .toolbar-row {
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
      }

      #searchInput {
        width: min(380px, 100%);
        border-radius: 8px;
        border: 1px solid var(--border);
        background: var(--panel);
        color: var(--text);
        padding: 8px 10px;
        font-size: 0.9rem;
        outline: none;
      }

      #searchInput:focus {
        border-color: rgba(0, 153, 204, 0.8);
        box-shadow: 0 0 0 2px rgba(0, 153, 204, 0.22);
      }

      #iconCount {
        font-size: 0.84rem;
        color: var(--muted);
      }

      #copyStatus {
        min-height: 1em;
        font-size: 0.84rem;
        color: #9ce7ff;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
        gap: 10px;
      }

      .icon-card {
        width: 100%;
        border: 1px solid var(--border);
        background: var(--panel);
        color: var(--text);
        border-radius: 10px;
        padding: 11px 10px 10px;
        cursor: pointer;
        display: grid;
        justify-items: center;
        gap: 8px;
        text-align: center;
        transition:
          border-color 120ms ease,
          background 120ms ease,
          transform 80ms ease;
      }

      .icon-card:hover {
        border-color: rgba(0, 153, 204, 0.9);
        background: var(--panel-2);
      }

      .icon-card:active {
        transform: translateY(1px);
      }

      .icon-card:focus-visible {
        outline: 2px solid rgba(0, 153, 204, 0.9);
        outline-offset: 1px;
      }

      .icon-card img {
        width: 28px;
        height: 28px;
        display: block;
        object-fit: contain;
        filter: brightness(0) saturate(100%) invert(95%) sepia(6%) saturate(359%)
          hue-rotate(175deg) brightness(105%) contrast(94%);
        pointer-events: none;
      }

      .icon-card .name {
        width: 100%;
        font-size: 0.74rem;
        line-height: 1.25;
        color: #d7e0ea;
        word-break: break-word;
        pointer-events: none;
      }

      .empty {
        border: 1px dashed var(--border);
        border-radius: 10px;
        background: var(--panel);
        color: var(--muted);
        padding: 16px;
        text-align: center;
        font-size: 0.86rem;
      }

      .flash {
        animation: flash-copy 320ms ease-out;
      }

      @keyframes flash-copy {
        0% {
          border-color: rgba(0, 153, 204, 1);
          box-shadow: 0 0 0 0 rgba(0, 153, 204, 0.5);
        }

        100% {
          border-color: var(--border);
          box-shadow: 0 0 0 8px rgba(0, 153, 204, 0);
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="toolbar">
        <h1>SVG Icons</h1>
        <div class="toolbar-row">
          <input
            id="searchInput"
            type="search"
            placeholder="Search icon name..."
            aria-label="Search icon name"
          />
          <span id="iconCount"></span>
        </div>
        <div id="copyStatus" aria-live="polite"></div>
      </div>

      <div id="iconsGrid" class="grid"></div>
      <div id="emptyState" class="empty" hidden>No icons match your search.</div>
    </div>

    <script>
      const ICONS = [
        "bluesky_social_fill.svg",
        "bluesky_social_line.svg",
        "clipboard_fill.svg",
        "clipboard_line.svg",
        "close_circle_fill.svg",
        "close_circle_line.svg",
        "down_fill.svg",
        "down_line.svg",
        "hand_heart_fill.svg",
        "hand_heart_line.svg",
        "heart_fill.svg",
        "heart_line.svg",
        "menu_fill.svg",
        "menu_line.svg",
        "moon_fill.svg",
        "moon_line.svg",
        "paste_fill.svg",
        "paste_line.svg",
        "paster_fill.svg",
        "paster_line.svg",
        "settings_3_fill.svg",
        "settings_3_line.svg",
        "share_3_fill.svg",
        "share_3_line.svg",
        "social_x_fill.svg",
        "social_x_line.svg",
        "sun_fill.svg",
        "sun_line.svg",
        "threads_fill.svg",
        "threads_line.svg",
        "toggle_left_fill.svg",
        "toggle_left_line.svg",
        "toggle_right_fill.svg",
        "toggle_right_line.svg",
        "twitter_fill.svg",
        "twitter_line.svg",
      ];

      const iconsGrid = document.getElementById("iconsGrid");
      const searchInput = document.getElementById("searchInput");
      const iconCount = document.getElementById("iconCount");
      const copyStatus = document.getElementById("copyStatus");
      const emptyState = document.getElementById("emptyState");
      let statusTimer = 0;

      function setCopyStatus(text) {
        copyStatus.textContent = text;
        window.clearTimeout(statusTimer);
        if (!text) {
          return;
        }
        statusTimer = window.setTimeout(() => {
          copyStatus.textContent = "";
        }, 1500);
      }

      async function copyText(text) {
        try {
          if (navigator.clipboard && navigator.clipboard.writeText) {
            await navigator.clipboard.writeText(text);
            return true;
          }
        } catch (_) {
          // Use fallback below.
        }

        try {
          const fallback = document.createElement("textarea");
          fallback.value = text;
          fallback.setAttribute("readonly", "");
          fallback.style.position = "fixed";
          fallback.style.opacity = "0";
          fallback.style.pointerEvents = "none";
          document.body.appendChild(fallback);
          fallback.focus();
          fallback.select();
          const copied = document.execCommand("copy");
          document.body.removeChild(fallback);
          return copied;
        } catch (_) {
          return false;
        }
      }

      function flashCopied(element) {
        element.classList.remove("flash");
        void element.offsetWidth;
        element.classList.add("flash");
      }

      async function handleCopy(name, cardElement) {
        const ok = await copyText(name);
        flashCopied(cardElement);
        setCopyStatus(ok ? `Copied: ${name}` : `Could not copy: ${name}`);
      }

      function buildCard(name) {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "icon-card";
        button.title = `Copy ${name}`;

        const image = document.createElement("img");
        image.src = `./${name}`;
        image.alt = name;

        const label = document.createElement("span");
        label.className = "name";
        label.textContent = name;

        button.appendChild(image);
        button.appendChild(label);
        button.addEventListener("click", () => handleCopy(name, button));
        return button;
      }

      function render(filter = "") {
        const query = String(filter || "").trim().toLowerCase();
        const filtered = ICONS.filter((name) => name.toLowerCase().includes(query));
        iconsGrid.textContent = "";

        filtered.forEach((name) => {
          iconsGrid.appendChild(buildCard(name));
        });

        iconCount.textContent = `${filtered.length} / ${ICONS.length}`;
        emptyState.hidden = filtered.length > 0;
      }

      searchInput.addEventListener("input", () => {
        render(searchInput.value);
      });

      render("");
    </script>
  </body>
</html>
